<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Library Slideshow</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
  }

  .slide {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
  }

  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .active {
    opacity: 1;
  }

  /* Progress bar */
  #progress {
    position: fixed;
    bottom: 0;
    left: 0;
    height: 6px;
    background: #00c3ff;
    width: 0%;
  }

  /* Dots */
  .dots {
    position: fixed;
    bottom: 20px;
    width: 100%;
    text-align: center;
  }

  .dot {
    display: inline-block;
    width: 12px;
    height: 12px;
    margin: 5px;
    background: white;
    border-radius: 50%;
    opacity: 0.5;
  }

  .dot.active {
    opacity: 1;
    background: #00c3ff;
  }
</style>
</head>

<body onclick="goFullscreen()">

<!-- Slides -->
<div class="slide active"><img src="slide1.jpg"></div>
<div class="slide"><img src="slide2.jpg"></div>
<div class="slide"><img src="slide3.jpg"></div>
<div class="slide"><img src="slide4.jpg"></div>
<div class="slide"><img src="slide5.jpg"></div>
<div class="slide"><img src="slide6.jpg"></div>

<!-- Progress bar -->
<div id="progress"></div>

<!-- Dots -->
<div class="dots" id="dots"></div>

<script>
window.addEventListener("load", function () {

  let slides = document.querySelectorAll(".slide");
  let index = 0;
  const duration = 8000;

  const progress = document.getElementById("progress");
  const dotsContainer = document.getElementById("dots");

  // Create dots
  slides.forEach((_, i) => {
    const dot = document.createElement("span");
    dot.classList.add("dot");
    if (i === 0) dot.classList.add("active");
    dotsContainer.appendChild(dot);
  });

  let dots = document.querySelectorAll(".dot");

  function updateDots() {
    dots.forEach(dot => dot.classList.remove("active"));
    dots[index].classList.add("active");
  }

  function animateProgress() {
    progress.style.transition = "none";
    progress.style.width = "0%";
    setTimeout(() => {
      progress.style.transition = `width ${duration}ms linear`;
      progress.style.width = "100%";
    }, 50);
  }

  function nextSlide() {
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");

    updateDots();
    animateProgress();
  }

  // Start
  animateProgress();
  setInterval(nextSlide, duration);

});

// Fullscreen
function goFullscreen() {
  const elem = document.documentElement;
  if (elem.requestFullscreen) {
    elem.requestFullscreen();
  }
}
</script>

</body>
</html>
